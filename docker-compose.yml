services:

  db:
    image: postgres:16

    container_name: bolao-db

    restart: always

    env_file:
      - .env

    volumes:
      - postgres_data:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  web:
    build: .

    container_name: bolao-web

    restart: always

    env_file:
      - .env

    depends_on:
      - db

    ports:
      - "8000:8000"

    volumes:
      - .:/app

volumes:
  postgres_data: