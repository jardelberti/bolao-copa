<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title | default("Bolão da Copa") }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="/">
                <span class="brand-mark">BC</span>
                <span>Bolão da Copa</span>
            </a>
            <div class="d-flex align-items-center gap-2">
                <a class="btn btn-outline-light btn-sm" href="/admin/users">Admin</a>
                <a class="btn btn-outline-light btn-sm" href="/admin/teams">Seleções</a>
                <a class="btn btn-outline-light btn-sm" href="/admin/games">Jogos</a>
                <a class="btn btn-outline-light btn-sm" href="#">Entrar</a>
                <a class="btn btn-gold btn-sm" href="/register">Cadastrar</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="py-4">
        <div class="container d-flex flex-column flex-md-row justify-content-between gap-2 small text-secondary">
            <span>Bolão da Copa</span>
            <span>Palpites, ranking e emoção de jogo em um só lugar.</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
