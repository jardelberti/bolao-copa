{% extends "base.html" %}

{% block content %}
<section class="auth-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-7 col-xl-6">
                <div class="auth-card">
                    <span class="section-kicker">Painel administrativo</span>
                    <h1 class="h2 fw-bold mt-2 mb-3">Cadastrar seleção</h1>
                    <p class="auth-copy mb-4">
                        Adicione o nome, o código FIFA e a URL da bandeira para exibir a seleção no bolão.
                    </p>

                    {% if errors %}
                    <div class="alert alert-danger" role="alert">
                        <ul class="mb-0">
                            {% for error in errors %}
                            <li>{{ error }}</li>
                            {% endfor %}
                        </ul>
                    </div>
                    {% endif %}

                    <form method="post" action="/admin/teams" novalidate>
                        <div class="mb-3">
                            <label class="form-label" for="name">Nome</label>
                            <input class="form-control" id="name" name="name" type="text" maxlength="100" value="{{ form.name | default('') }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="code">Código FIFA</label>
                            <input class="form-control text-uppercase" id="code" name="code" type="text" maxlength="5" value="{{ form.code | default('') }}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="flag_url">URL da bandeira</label>
                            <input class="form-control" id="flag_url" name="flag_url" type="url" maxlength="255" value="{{ form.flag_url | default('') }}" required>
                        </div>

                        <div class="d-grid d-sm-flex gap-3 mt-4 admin-form-actions">
                            <button class="btn btn-gold btn-lg px-4" type="submit">Cadastrar</button>
                            <a class="btn btn-outline-light btn-lg px-4" href="/admin/teams">Voltar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
